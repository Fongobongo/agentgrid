name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: fmt / clippy / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: format check
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: build
        run: cargo build --workspace

  web:
    name: web build / lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  e2e-failinject:
    name: e2e failure injection (process, no Docker)
    runs-on: ubuntu-latest
    needs: [rust]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build debug binaries
        run: cargo build --workspace
      - name: outbox durability (kill -9, CP outage, lost/retry)
        run: bash tests/e2e/run-outbox.sh
      - name: CP restart under load
        run: bash tests/e2e/run-cp-restart.sh

  e2e:
    name: e2e (compose + 2 nodes + mock)
    runs-on: ubuntu-latest
    needs: [rust, web]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: bring up stack and run a task
        run: bash tests/e2e/run.sh
