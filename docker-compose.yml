# Stage 5.3: one control plane (SQLite + artifacts on a persistent volume)
# and two node-daemon containers. Migrations run at control-plane startup.
#
# Tokens are NOT baked in: run `deploy/compose/up.sh` which bootstraps a user,
# creates enrollment tokens, writes them to `.env`, and brings the nodes up.
services:
  control-plane:
    image: ag-cp:test
    restart: unless-stopped
    ports:
      - "7800:7800"
    environment:
      # First-run bootstrap user (created once, then the window closes).
      AGENTGRID_BOOTSTRAP_USER: ${AGENTGRID_BOOTSTRAP_USER:-admin}
      AGENTGRID_BOOTSTRAP_PASSWORD: ${AGENTGRID_BOOTSTRAP_PASSWORD:-changeme}
      AGENTGRID_JWT_SECRET: ${AGENTGRID_JWT_SECRET:-dev-insecure-secret-change-me}
      AGENTGRID_LISTEN: 0.0.0.0:7800
    volumes:
      - agentgrid-data:/var/lib/agentgrid

  node-1:
    image: ag-node:test
    restart: unless-stopped
    depends_on:
      - control-plane
    environment:
      AGENTGRID_SERVER: http://control-plane:7800
      AGENTGRID_ENROLL_TOKEN: ${NODE1_TOKEN:-}
      AGENTGRID_NODE_NAME: node-1
      AGENTGRID_MAX_CONCURRENCY: "2"
    volumes:
      - agentgrid-node1-data:/var/lib/agentgrid/data

  node-2:
    image: ag-node:test
    restart: unless-stopped
    depends_on:
      - control-plane
    environment:
      AGENTGRID_SERVER: http://control-plane:7800
      AGENTGRID_ENROLL_TOKEN: ${NODE2_TOKEN:-}
      AGENTGRID_NODE_NAME: node-2
      AGENTGRID_MAX_CONCURRENCY: "2"
    volumes:
      - agentgrid-node2-data:/var/lib/agentgrid/data

volumes:
  agentgrid-data:
  agentgrid-node1-data:
  agentgrid-node2-data:
